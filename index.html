// ── File/image reader utility ──────────────────────────────────────────

function readFileAsText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result);
    r.onerror = () => rej(new Error('File read failed'));
    r.readAsText(file);
  });
}
function readFileAsBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('File read failed'));
    r.readAsDataURL(file);
  });
}

// ── Full PR Review ─────────────────────────────────────────────────────
// Phase 1: Context modal (optional user notes + file attachments)
// Phase 2: Results + post-to-PR

function FullPRReview({ creds, pr, changedFiles, threads, onUsage, model, parsed, latestIteration }) {
  const toast = useToast();
  // phase: 'idle' | 'input' | 'loading' | 'result'
  const [phase,       setPhase]       = useState('idle');
  const [result,      setResult]      = useState(null);
  // User inputs in the context modal
  const [userContext, setUserContext] = useState('');
  const [attachments, setAttachments] = useState([]); // [{ name, type, content, isImage, b64 }]
  const [postingReview, setPostingReview] = useState(false);
  const fileInputRef = useRef(null);

  const base    = apiBase(parsed);
  const repoEnc = encodeURIComponent(parsed.repo);

  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape' && phase !== 'loading') setPhase('idle'); }
    if (phase !== 'idle') document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [phase]);

  async function handleFileAttach(e) {
    const files = Array.from(e.target.files || []);
    for (const file of files) {
      const isImage = file.type.startsWith('image/');
      const isBinary = !isImage && !['text/','application/json','application/xml'].some(t=>file.type.startsWith(t)) && !file.name.match(/\.(txt|md|csv|json|xml|yaml|yml|toml|py|js|ts|jsx|tsx|sql|sh|env)$/i);
      if (isBinary) { toast(`${file.name} is not a supported file type`, 'warn'); continue; }
      try {
        if (isImage) {
          const b64  = await readFileAsBase64(file);
          setAttachments(p => [...p, { name:file.name, type:file.type, isImage:true, b64, size:file.size }]);
        } else {
          const text = await readFileAsText(file);
          setAttachments(p => [...p, { name:file.name, type:file.type, isImage:false, content:text.slice(0,8000), size:file.size }]);
        }
      } catch(err) { toast(`Failed to read ${file.name}: ${err.message}`, 'error'); }
    }
    e.target.value = '';
  }

  async function fetchText(path, commitId) {
    const res = await fetch(
      `${base}/repositories/${repoEnc}/items?path=${encodeURIComponent('/'+path)}&versionDescriptor.version=${encodeURIComponent(commitId)}&versionDescriptor.versionType=commit&api-version=7.1`,
      { headers: { Authorization: b64(creds.pat), Accept: 'text/plain' } }
    );
    if (!res.ok) return '';
    return res.text();
  }

  async function run() {
    setPhase('loading'); setResult(null);
    try {
      const src = pr.lastMergeSourceCommit?.commitId;
      const tgt = pr.lastMergeTargetCommit?.commitId;
      const filesToReview = changedFiles.slice(0, 5);
      const fileDiffs = await Promise.all(filesToReview.map(async f => {
        const [ot, nt] = await Promise.all([
          src && tgt ? fetchText(f.path, tgt).catch(()=>'') : Promise.resolve(''),
          src ? fetchText(f.path, src).catch(()=>'') : Promise.resolve(''),
        ]);
        const dr = computeClientDiff(ot, nt);
        const changed = dr.filter(r=>!r.hunk&&r.type!=='ctx').map(r=>(r.type==='add'?'+':'-')+r.t).join('\n');
        return { path: f.path, diff: changed.slice(0, 1500) };
      }));

      const activeThreads = threads.filter(t=>!t.isDeleted&&t.comments?.length&&['active','pending'].includes(t.status));

      // Build message array for Claude API (supports images via vision)
      const messageContent = [];

      // Text prompt
      let textPrompt = `You are a senior software engineer and architect performing a comprehensive pull request review.\n`;
      textPrompt += `PR: "${pr.title}" (#${pr.pullRequestId})\n`;
      if (pr.description) textPrompt += `Description: ${pr.description.slice(0,500)}\n`;
      if (creds.context) textPrompt += `Project context: ${creds.context}\n`;
      if (userContext.trim()) textPrompt += `\nReviewer's additional context:\n${userContext.trim()}\n`;
      // Inject team conventions
      const allConventions = (() => { try { return JSON.parse(sessionStorage.getItem('pr_review_conventions')||'[]'); } catch { return []; } })();
      if (allConventions.length) textPrompt += `\nTeam coding conventions (must check each one):\n${allConventions.map((c,i)=>`${i+1}. ${c}`).join('\n')}\n`;
      textPrompt += `\nBranch: ${(pr.sourceRefName||'').replace('refs/heads/','')} -> ${(pr.targetRefName||'').replace('refs/heads/','')}\n`;
      textPrompt += `Changed files (${changedFiles.length} total, showing up to 5):\n`;
      fileDiffs.forEach(f => { textPrompt += `\n--- ${f.path} ---\n${f.diff||'(no diff / binary)'}\n`; });
      if (changedFiles.length > 5) textPrompt += `\n...and ${changedFiles.length-5} more files.\n`;
      if (activeThreads.length) {
        textPrompt += `\nOpen review threads (${activeThreads.length}):\n`;
        activeThreads.slice(0,5).forEach((t,i) => {
          textPrompt += `${i+1}. [${t.threadContext?.filePath||'PR'}] ${(t.comments[0]?.content||'').slice(0,200)}\n`;
        });
      }
      // Append text attachments
      const textAttachments = attachments.filter(a=>!a.isImage);
      if (textAttachments.length) {
        textPrompt += `\nAttached reference files:\n`;
        textAttachments.forEach(a => { textPrompt += `\n=== ${a.name} ===\n${a.content}\n`; });
      }
      textPrompt += `\nRespond ONLY with a valid JSON object (no markdown fences, no preamble, no extra text outside the JSON).

The "postComment" field must contain a complete, standalone Azure DevOps PR comment written in clean markdown. Requirements for postComment:
- Start with ## AI Review Summary
- Use a status line: **Status:** Approved / Request Changes / Approved with Suggestions
- Use a **Walkthrough** paragraph (plain prose, no bullets)
- Use markdown tables for issues, one table per severity group (Must Fix, Should Fix, Minor, Security). Table columns: | File | Issue | Suggestion |
- Use a **Checklist** section with a markdown table: | Item | Status | where Status is Y, N, or ? 
- End with a horizontal rule and a note that this review was generated by an AI assistant and should be validated by a human reviewer
- Do NOT include any JSON syntax, curly braces, brackets, or raw field names anywhere in postComment
- Write postComment as if it is a senior engineer's review comment — professional, precise, actionable
- Keep total length under 3000 characters

JSON structure:
{"classification":"Red|Yellow|Green","summary":"2-3 sentence plain-language assessment","risk":"Breaking change|Safe refactor|Logic change|Config change|Unknown","walkthrough":"one paragraph","mustFix":[{"file":"","line":null,"issue":"","suggestion":""}],"shouldFix":[{"file":"","line":null,"issue":"","suggestion":""}],"minor":[{"file":"","line":null,"issue":"","suggestion":""}],"security":[{"file":"","line":null,"issue":""}],"checklist":{"hasTests":null,"hasMigration":null,"breakingChange":null,"docUpdated":null,"namingConsistent":null},"postComment":"[full markdown comment here]"}`;

      messageContent.push({ type:'text', text: textPrompt });

      // Append image attachments
      const imageAttachments = attachments.filter(a=>a.isImage);
      imageAttachments.forEach(a => {
        messageContent.push({ type:'text', text:`\nAttached screenshot/image: ${a.name}` });
        messageContent.push({ type:'image', source:{ type:'base64', media_type:a.type, data:a.b64 } });
      });

      // Call Claude API directly (supports multimodal)
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'x-api-key':creds.anthropicKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true', 'Content-Type':'application/json' },
        body: JSON.stringify({ model, max_tokens:3000, messages:[{ role:'user', content: messageContent }] }),
      });
      if (!r.ok) { const t=await r.text().catch(()=>''); throw new Error(`Claude ${r.status}: ${t.slice(0,300)}`); }
      const d = await r.json();
      const text = d.content[0].text;
      onUsage?.(d.usage?.input_tokens||0, d.usage?.output_tokens||0);

      try { setResult(JSON.parse(text.replace(/```json|```/g,'').trim())); }
      catch(_) { setResult({ summary:text, classification:'Yellow', walkthrough:'', mustFix:[], shouldFix:[], minor:[], security:[], checklist:{}, postComment:text }); }
      setPhase('result');
    } catch(e) { toast(e.message, 'error'); setPhase('input'); }
  }

  // Sanitize the postComment field before posting to ADO.
  // Claude occasionally leaks JSON syntax into markdown text fields.
  // This strips: leading/trailing JSON braces, raw field name patterns, code fences.
  function sanitizePostComment(raw) {
    if (!raw) return '';
    let s = raw.trim();
    // Strip leading/trailing JSON object wrappers if the whole string is JSON
    if (s.startsWith('{') && s.endsWith('}')) {
      try {
        const parsed = JSON.parse(s);
        if (parsed.postComment) return sanitizePostComment(parsed.postComment);
      } catch(_) {}
    }
    // Strip ```json fences
    s = s.replace(/```json[\s\S]*?```/g, '').replace(/```[\s\S]*?```/g, match => {
      // Keep code blocks that look like intentional code, not JSON dumps
      const inner = match.replace(/```\w*\n?/, '').replace(/```$/, '');
      if (inner.trim().startsWith('{') && inner.includes('"classification"')) return '';
      return match;
    });
    // Strip raw JSON field patterns at line starts: "fieldName": value,
    s = s.replace(/^\s*"(classification|summary|risk|walkthrough|mustFix|shouldFix|minor|security|checklist|postComment|hasTests|hasMigration|breakingChange|docUpdated|namingConsistent)"[\s\S]*$/gm, '');
    // Collapse multiple blank lines
    s = s.replace(/\n{3,}/g, '\n\n').trim();
    return s;
  }

  async function postReviewComment() {
    if (!result?.postComment) return;
    setPostingReview(true);
    try {
      const clean = sanitizePostComment(result.postComment);
      await adoPost(
        `${base}/repositories/${repoEnc}/pullrequests/${parsed.prId}/threads?api-version=7.1`,
        creds.pat,
        { comments:[{ parentCommentId:0, content: clean, commentType:1 }], status:1 }
      );
      toast('Review comment posted to PR', 'success');
    } catch(e) { toast(e.message, 'error'); }
    finally { setPostingReview(false); }
  }

  const CLS_COLOR = { Red:'var(--red)', Yellow:'var(--amber)', Green:'var(--green)' };
  const CLS_BG    = { Red:'rgba(248,81,73,0.1)', Yellow:'rgba(210,153,34,0.1)', Green:'rgba(63,185,80,0.1)' };
  const CLS_BORDER= { Red:'rgba(248,81,73,0.3)', Yellow:'rgba(210,153,34,0.3)', Green:'rgba(63,185,80,0.3)' };

  function IssueList({ items, label, variant }) {
    if (!items?.length) return null;
    return (
      <div style={{ marginBottom:16 }}>
        <p className="slabel" style={{ marginBottom:8 }}>{label} <span style={{ color:'var(--text-dim)', fontWeight:400, textTransform:'none', letterSpacing:0 }}>({items.length})</span></p>
        {items.map((item,i) => (
          <div key={i} className={`sev-${variant}`} style={{ padding:'10px 14px', marginBottom:6 }}>
            {item.file && <div style={{ fontFamily:'JetBrains Mono', fontSize:10, color:'var(--text-muted)', marginBottom:4 }}>{item.file}{item.line?`:${item.line}`:''}</div>}
            <p style={{ fontSize:12, fontWeight:600, color:'var(--text)', margin:'0 0 4px' }}>{item.issue}</p>
            {item.suggestion && <p style={{ fontSize:12, color:'var(--text-muted)', margin:0, lineHeight:1.55 }}>{item.suggestion}</p>}
          </div>
        ))}
      </div>
    );
  }

  function ChecklistRow({ label, val }) {
    const s = val===true?'pass':val===false?'fail':'unknown';
    return (
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 12px', borderRadius:6,
        background: s==='pass'?'rgba(63,185,80,0.08)':s==='fail'?'rgba(248,81,73,0.08)':'rgba(255,255,255,0.03)', marginBottom:3 }}>
        <span style={{ fontSize:12, color:'var(--text-muted)' }}>{label}</span>
        <span style={{ fontFamily:'JetBrains Mono', fontSize:11, fontWeight:700, color: s==='pass'?'var(--green)':s==='fail'?'var(--red)':'var(--text-dim)' }}>
          {s==='pass'?'Y':s==='fail'?'N':'?'}
        </span>
      </div>
    );
  }

  // Total issues count badge for the trigger button
  const issueCount = result ? (result.mustFix?.length||0)+(result.security?.length||0)+(result.shouldFix?.length||0) : 0;

  return (
    <>
      {/* Trigger button */}
      <Btn onClick={()=>setPhase('input')} variant="violet" size="sm" disabled={phase==='loading'}>
        {phase==='loading' ? <><Spin size={12} /> Reviewing...</> : (
          <>
            Full PR Review
            {issueCount > 0 && <span style={{ background:'var(--red)', color:'#fff', fontSize:9, fontWeight:700, padding:'1px 5px', borderRadius:999, marginLeft:2 }}>{issueCount}</span>}
          </>
        )}
      </Btn>

      {/* Phase 1: Context input modal */}
      {phase === 'input' && (
        <div className="modal-bg" style={{ position:'fixed', inset:0, display:'flex', alignItems:'flex-start', justifyContent:'center', zIndex:100, padding:16, paddingTop:32, overflowY:'auto' }}>
          <div className="panel fade-up" style={{ width:'100%', maxWidth:600, marginBottom:32 }}>
            {/* Header */}
            <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
              <div>
                <h2 style={{ fontSize:15, fontWeight:700, color:'var(--text)', margin:0 }}>Full PR Review</h2>
                <p style={{ fontSize:11, color:'var(--text-muted)', margin:'3px 0 0', fontFamily:'JetBrains Mono' }}>#{pr.pullRequestId} — {changedFiles.length} files changed</p>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <kbd>Esc</kbd>
                <button onClick={()=>setPhase('idle')} style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:14 }}>x</button>
              </div>
            </div>

            <div style={{ padding:20 }}>
              {/* PR context summary */}
              <div style={{ background:'rgba(88,166,255,0.06)', border:'1px solid rgba(88,166,255,0.15)', borderRadius:8, padding:'10px 14px', marginBottom:16 }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:4, fontWeight:600 }}>What will be reviewed</div>
                <div style={{ fontSize:12, color:'var(--text)', lineHeight:1.6 }}>
                  {changedFiles.slice(0,4).map(f=>(
                    <span key={f.path} style={{ fontFamily:'JetBrains Mono', fontSize:10, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:4, padding:'1px 6px', marginRight:4, marginBottom:4, display:'inline-block' }}>
                      {f.path.split('/').pop()}
                    </span>
                  ))}
                  {changedFiles.length > 4 && <span style={{ fontSize:11, color:'var(--text-dim)' }}>+{changedFiles.length-4} more</span>}
                </div>
              </div>

              {/* Optional reviewer context */}
              <Field label="Additional context for Claude (optional)" hint="Describe the intent of this PR, known trade-offs, areas to focus on, or anything the reviewer should understand.">
                <textarea value={userContext} onChange={e=>setUserContext(e.target.value)} rows={4}
                  className="inp" style={{ resize:'vertical', lineHeight:1.6 }}
                  placeholder="e.g. This PR migrates the Snowflake ETL pipeline from password auth to key-pair. Focus on the PEM loading logic and the fallback handling. The performance regression in test X is known and acceptable." />
              </Field>

              {/* File attachments */}
              <div style={{ marginTop:14 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
                  <label style={{ fontSize:12, fontWeight:500, color:'var(--text-muted)' }}>Attachments <span style={{ color:'var(--text-dim)', fontWeight:400 }}>(optional)</span></label>
                  <Btn onClick={()=>fileInputRef.current?.click()} variant="secondary" size="xs">Attach Files</Btn>
                </div>
                <input ref={fileInputRef} type="file" multiple accept="image/*,.txt,.md,.csv,.json,.xml,.yaml,.yml,.toml,.py,.js,.ts,.jsx,.tsx,.sql,.sh" style={{ display:'none' }} onChange={handleFileAttach} />
                <div style={{ fontSize:10, color:'var(--text-dim)', marginBottom:8 }}>
                  Supports: images (screenshots, diagrams), .md, .txt, .csv, .json, .yaml, .py, .js, .ts, .sql
                </div>
                {attachments.length > 0 && (
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                    {attachments.map((a,i) => (
                      <div key={i} style={{ display:'flex', alignItems:'center', gap:6, background:'var(--surface)', border:'1px solid var(--border)', borderRadius:6, padding:'4px 8px 4px 6px' }}>
                        {a.isImage && a.b64 && (
                          <img src={`data:${a.type};base64,${a.b64}`} alt={a.name} style={{ width:28, height:28, objectFit:'cover', borderRadius:3, border:'1px solid var(--border)' }} />
                        )}
                        {!a.isImage && (
                          <span style={{ fontSize:9, fontFamily:'JetBrains Mono', background:'var(--card)', color:'var(--accent)', padding:'1px 4px', borderRadius:3 }}>
                            {a.name.split('.').pop().toUpperCase()}
                          </span>
                        )}
                        <span style={{ fontSize:11, color:'var(--text-muted)', maxWidth:120, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{a.name}</span>
                        <button onClick={()=>setAttachments(p=>p.filter((_,j)=>j!==i))}
                          style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:11, padding:0, lineHeight:1 }}>x</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Actions */}
              <div style={{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:20, paddingTop:16, borderTop:'1px solid var(--border)' }}>
                <Btn onClick={()=>setPhase('idle')} variant="secondary" size="sm">Cancel</Btn>
                <Btn onClick={run} variant="violet" size="sm">
                  Start Review
                </Btn>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Phase 2: Loading */}
      {phase === 'loading' && (
        <div className="modal-bg" style={{ position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center', zIndex:100, padding:16 }}>
          <div className="panel fade-up" style={{ width:'100%', maxWidth:400, padding:40, textAlign:'center' }}>
            <div style={{ display:'flex', justifyContent:'center', marginBottom:16 }}><LoadingDots /></div>
            <p style={{ fontSize:14, fontWeight:600, color:'var(--text)', margin:'0 0 6px' }}>Reviewing PR...</p>
            <p style={{ fontSize:12, color:'var(--text-muted)', margin:0 }}>Fetching diffs, analyzing code, checking security</p>
            {attachments.length > 0 && <p style={{ fontSize:11, color:'var(--text-dim)', marginTop:8 }}>Including {attachments.length} attachment{attachments.length>1?'s':''}</p>}
          </div>
        </div>
      )}

      {/* Phase 3: Results */}
      {phase === 'result' && result && (
        <div className="modal-bg" style={{ position:'fixed', inset:0, display:'flex', alignItems:'flex-start', justifyContent:'center', zIndex:100, padding:16, paddingTop:24, overflowY:'auto' }}>
          <div className="panel fade-up" style={{ width:'100%', maxWidth:700, marginBottom:32 }}>
            {/* Header */}
            <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ fontSize:12, fontWeight:700, padding:'4px 12px', borderRadius:999, background:CLS_BG[result.classification]||CLS_BG.Yellow, color:CLS_COLOR[result.classification]||CLS_COLOR.Yellow, border:`1px solid ${CLS_BORDER[result.classification]||CLS_BORDER.Yellow}` }}>
                  {result.classification||'Yellow'}
                </span>
                <span style={{ fontSize:12, fontWeight:500, padding:'4px 12px', borderRadius:999, background:'var(--surface)', color:'var(--text-muted)', border:'1px solid var(--border)' }}>
                  {result.risk}
                </span>
                <h2 style={{ fontSize:14, fontWeight:600, color:'var(--text)', margin:0 }}>Full PR Review</h2>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <kbd>Esc</kbd>
                <Btn onClick={()=>setPhase('input')} variant="ghost" size="xs">Back</Btn>
                <button onClick={()=>setPhase('idle')} style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:14 }}>x</button>
              </div>
            </div>

            <div style={{ padding:20 }}>
              {/* Summary */}
              <p style={{ fontSize:13, color:'var(--text)', lineHeight:1.7, marginBottom:14, padding:'10px 14px', background:'rgba(255,255,255,0.03)', borderRadius:8, border:'1px solid var(--border)' }}>{result.summary}</p>

              {/* Walkthrough */}
              {result.walkthrough && (
                <div style={{ marginBottom:16 }}>
                  <p className="slabel" style={{ marginBottom:6 }}>Walkthrough</p>
                  <p style={{ fontSize:12, color:'var(--text-muted)', lineHeight:1.7, margin:0 }}>{result.walkthrough}</p>
                </div>
              )}

              {/* Issue lists */}
              <IssueList items={result.mustFix}   label="Must Fix"   variant="critical" />
              <IssueList items={result.security}  label="Security"   variant="high" />
              <IssueList items={result.shouldFix} label="Should Fix" variant="medium" />
              <IssueList items={result.minor}     label="Minor"      variant="info" />

              {/* Checklist */}
              {result.checklist && (
                <div style={{ marginBottom:16 }}>
                  <p className="slabel" style={{ marginBottom:8 }}>Checklist</p>
                  <ChecklistRow label="Tests included"     val={result.checklist.hasTests} />
                  <ChecklistRow label="Migration included" val={result.checklist.hasMigration} />
                  <ChecklistRow label="Breaking change"    val={result.checklist.breakingChange} />
                  <ChecklistRow label="Docs updated"       val={result.checklist.docUpdated} />
                  <ChecklistRow label="Naming consistent"  val={result.checklist.namingConsistent} />
                </div>
              )}

              {/* Post comment preview + action */}
              {result.postComment && (
                <div style={{ marginTop:16, paddingTop:16, borderTop:'1px solid var(--border)' }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
                    <p className="slabel">Post to PR as Comment</p>
                    <Btn onClick={postReviewComment} disabled={postingReview} variant="green" size="xs">
                      {postingReview ? <><Spin size={11} /> Posting...</> : 'Post Review Comment'}
                    </Btn>
                  </div>
                  <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 14px', maxHeight:160, overflowY:'auto' }}>
                    <MarkdownOutput text={result.postComment} />
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ── Thread card ────────────────────────────────────────────────────────

const AI_ACTIONS = [
  { key:'explain', label:'Explain' },
  { key:'suggest', label:'Suggest Fix' },
  { key:'draft',   label:'Draft Reply' },
];
const THREAD_STATUSES = [
  { value:1, label:'Active' }, { value:2, label:'Fixed' }, { value:3, label:"Won't Fix" },
  { value:4, label:'Closed' }, { value:5, label:'Pending' },
];

function ThreadCard({ thread, creds, prTitle, onApply, onSelectFile, onUsage, model, parsed, diffContext }) {
  const toast = useToast();
  const [results,       setResults]       = useState({});
  const [loading,       setLoading]       = useState({});
  const [active,        setActive]        = useState(null);
  const [expanded,      setExpanded]      = useState(true);
  const [statusLoading, setStatusLoading] = useState(false);
  const [currentStatus, setCurrentStatus] = useState(thread.status);

  const root    = thread.comments?.[0];
  const replies = thread.comments?.slice(1) || [];
  const file    = thread.threadContext?.filePath?.replace(/^\//,'');
  const lineNum = thread.threadContext?.rightFileStart?.line;

  async function runAI(key) {
    if (results[key]) { setActive(key); return; }
    setActive(key);
    setLoading(p => ({ ...p, [key]: true }));
    try {
      const allText = thread.comments.map(c=>`${c.author?.displayName||'Unknown'}: ${c.content}`).join('\n');
      let prompt = `You are helping review a pull request.\nPR: "${prTitle}"`;
      if (creds.context) prompt += `\nContext: ${creds.context}`;
      if (file) prompt += `\nFile: ${file}${lineNum?` line ${lineNum}`:''}`;
      if (diffContext) prompt += `\n\nCode context:\n\`\`\`\n${diffContext.slice(0,1200)}\n\`\`\``;
      prompt += `\n\nComment thread:\n${allText}\n\n`;
      if (key==='explain') prompt += 'Explain what the reviewer is asking for. Use markdown for clarity.';
      else if (key==='suggest') prompt += 'Provide a concrete code-level fix with code snippets. Use markdown.';
      else prompt += "Draft a professional reply from the PR author. Natural tone. Use markdown if helpful.";
      const { text, inputTokens, outputTokens } = await claude(creds.anthropicKey, prompt, model);
      setResults(p => ({ ...p, [key]: text }));
      onUsage?.(inputTokens, outputTokens);
    } catch(e) {
      setResults(p => ({ ...p, [key]: `**Error:** ${e.message}` }));
    } finally { setLoading(p => ({ ...p, [key]: false })); }
  }

  function toggle(key) {
    if (active === key && !loading[key]) setActive(null);
    else runAI(key);
  }

  async function updateStatus(newVal) {
    setStatusLoading(true);
    try {
      const base = apiBase(parsed);
      await adoPatch(
        `${base}/repositories/${encodeURIComponent(parsed.repo)}/pullrequests/${parsed.prId}/threads/${thread.id}?api-version=7.1`,
        creds.pat, { status: newVal }
      );
      const label = THREAD_STATUSES.find(s=>s.value===newVal)?.label || String(newVal);
      setCurrentStatus(label.toLowerCase().replace(/\s/g,''));
      toast(`Thread marked as ${label}`, 'success');
    } catch(e) { toast(e.message, 'error'); }
    finally { setStatusLoading(false); }
  }

  const result    = active ? results[active] : null;
  const isLoading = active ? loading[active] : false;

  return (
    <div className="panel thread-card" style={{ overflow:'hidden' }}>
      {/* Header */}
      <div style={{ padding:'10px 14px', background:'var(--surface)', display:'flex', alignItems:'flex-start', gap:10 }}>
        <Avatar name={root?.author?.displayName} size={26} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:2 }}>
            <span style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{root?.author?.displayName||'Unknown'}</span>
            <span className={`chip ${STATUS_CHIP[currentStatus]||'chip-active'}`}>{currentStatus||'active'}</span>
            {file && (
              <button onClick={()=>onSelectFile(file)} title={file}
                style={{ fontFamily:'JetBrains Mono', fontSize:10, background:'rgba(88,166,255,0.1)', color:'var(--accent)', border:'1px solid rgba(88,166,255,0.2)', borderRadius:6, padding:'2px 8px', cursor:'pointer', maxWidth:180, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {file.split('/').pop()}{lineNum?`:${lineNum}`:''}
              </button>
            )}
          </div>
          <span style={{ fontSize:11, color:'var(--text-dim)' }}>{relTime(root?.publishedDate)}</span>
        </div>
        <button onClick={()=>setExpanded(e=>!e)}
          style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:11, padding:'2px 4px', borderRadius:4, flexShrink:0 }}>
          {expanded ? '▲' : '▼'}
        </button>
      </div>

      {expanded && (
        <div style={{ padding:'12px 14px' }}>
          {/* Comment text */}
          <div style={{ fontSize:13, color:'var(--text)', lineHeight:1.65, whiteSpace:'pre-wrap', marginBottom:10 }}>{root?.content}</div>

          {/* Replies */}
          {replies.length > 0 && (
            <div style={{ borderLeft:'2px solid var(--border)', paddingLeft:12, marginBottom:12 }}>
              {replies.map(c => (
                <div key={c.id} style={{ display:'flex', gap:8, marginBottom:10 }}>
                  <Avatar name={c.author?.displayName} size={22} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:'flex', alignItems:'baseline', gap:8, marginBottom:2 }}>
                      <span style={{ fontSize:12, fontWeight:600, color:'var(--text-muted)' }}>{c.author?.displayName}</span>
                      <span style={{ fontSize:10, color:'var(--text-dim)' }}>{relTime(c.publishedDate)}</span>
                    </div>
                    <div style={{ fontSize:12, color:'var(--text-muted)', lineHeight:1.6, whiteSpace:'pre-wrap' }}>{c.content}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* AI action buttons */}
          <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
            {AI_ACTIONS.map(({ key, label }) => (
              <Btn key={key} onClick={()=>toggle(key)} disabled={loading[key]} variant="secondary" size="xs"
                style={ active===key&&(results[key]||loading[key]) ? { borderColor:'var(--accent)', color:'var(--accent)', background:'rgba(88,166,255,0.1)' } : {}}>
                {loading[key] ? <><Spin size={10} /> {label}</> : label}
              </Btn>
            ))}
            <div style={{ flex:1 }} />
            <Btn onClick={()=>onApply(thread.id,'')} variant="ghost" size="xs">Reply</Btn>
          </div>

          {/* AI result */}
          {(result || isLoading) && (
            <div style={{ background:'rgba(88,166,255,0.05)', border:'1px solid rgba(88,166,255,0.15)', borderRadius:8, padding:'12px 14px', marginBottom:10 }} className="fade-up">
              {isLoading && !result ? (
                <div style={{ display:'flex', alignItems:'center', gap:8, padding:'4px 0' }}>
                  <LoadingDots />
                  <span style={{ fontSize:12, color:'var(--text-muted)' }}>Claude is thinking...</span>
                </div>
              ) : (
                <>
                  <MarkdownOutput text={result} />
                  <div style={{ display:'flex', gap:8, marginTop:10 }}>
                    <Btn onClick={()=>onApply(thread.id, result)} size="xs" variant="primary">Apply to Composer</Btn>
                    <Btn onClick={()=>{ setActive(null); setResults({}); }} size="xs" variant="ghost">Dismiss</Btn>
                  </div>
                </>
              )}
            </div>
          )}

          {/* Status management */}
          <div style={{ borderTop:'1px solid var(--border-sub)', paddingTop:10, display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
            <span style={{ fontSize:10, color:'var(--text-dim)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em', marginRight:2 }}>Status:</span>
            {THREAD_STATUSES.map(s => (
              <Btn key={s.value} onClick={()=>updateStatus(s.value)} disabled={statusLoading} variant="ghost" size="xs"
                style={{ border:'1px solid var(--border)', fontSize:11 }}>
                {s.label}
              </Btn>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Summarize panel ────────────────────────────────────────────────────

function SummarizePanel({ creds, threads, prTitle, onUsage, model, conventions = [] }) {
  const toast = useToast();
  const [loading, setLoading] = useState(false);
  const [result,  setResult]  = useState('');

  async function run() {
    setLoading(true); setResult('');
    try {
      const active = threads.filter(t=>!t.isDeleted&&t.comments?.length&&['active','pending'].includes(t.status));
      if (!active.length) { setResult('No active threads to summarize.'); setLoading(false); return; }
      const body = active.map((t,i) => {
        const f = t.threadContext?.filePath||'';
        const lines = t.comments.map(c=>`  ${c.author?.displayName||'?'}: ${c.content}`).join('\n');
        return `Thread ${i+1}${f?` (${f})`:''}:\n${lines}`;
      }).join('\n\n');
      let prompt = `PR: "${prTitle}"${creds.context?`\nContext: ${creds.context}`:''}`;
      if (conventions.length) prompt += `\nTeam conventions: ${conventions.join('; ')}`;
      prompt += `\n\nActive threads:\n\n${body}\n\nSummarize with markdown grouped by urgency: must-fix, should-fix, minor. Call out any convention violations explicitly. Be concise and actionable.`;
      const { text, inputTokens, outputTokens } = await claude(creds.anthropicKey, prompt, model);
      setResult(text); onUsage?.(inputTokens, outputTokens);
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      <Btn onClick={run} disabled={loading} variant="secondary" size="xs" style={{ width:'100%', justifyContent:'center' }}>
        {loading ? <><Spin size={11} /> Summarizing...</> : 'Summarize All Threads'}
      </Btn>
      {result && (
        <div style={{ marginTop:10, background:'rgba(88,166,255,0.04)', border:'1px solid rgba(88,166,255,0.12)', borderRadius:8, padding:'10px 12px' }} className="fade-up">
          <MarkdownOutput text={result} />
        </div>
      )}
    </div>
  );
}

// ── Vote panel ─────────────────────────────────────────────────────────

function VotePanel({ creds, pr, parsed, onVoted }) {
  const toast   = useToast();
  const [loading, setLoading] = useState(false);

  async function castVote(vote) {
    setLoading(true);
    try {
      const base    = apiBase(parsed);
      const repoEnc = encodeURIComponent(parsed.repo);
      const connData = await adoGet('https://app.vssps.visualstudio.com/_apis/profile/profiles/me?api-version=7.1', creds.pat);
      const userId = connData.id;
      if (!userId) throw new Error('Could not resolve user ID. Ensure PAT has Profile (Read) scope.');
      await adoPut(
        `${base}/repositories/${repoEnc}/pullrequests/${parsed.prId}/reviewers/${userId}?api-version=7.1`,
        creds.pat, { id: userId, vote, isRequired: false }
      );
      const label = vote===10?'Approved':vote===-10?'Rejected':vote===5?'Approved with suggestions':'Vote cleared';
      toast(label, vote>=0?'success':'warn');
      onVoted?.();
    } catch(e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }

  return (
    <div>
      <p className="slabel" style={{ marginBottom:8 }}>Cast Vote</p>
      <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
        <button onClick={()=>castVote(10)}  disabled={loading} className="vote-btn vote-approve">Approve</button>
        <button onClick={()=>castVote(5)}   disabled={loading} className="vote-btn vote-suggest">Approve with Suggestions</button>
        <button onClick={()=>castVote(-10)} disabled={loading} className="vote-btn vote-reject">Reject</button>
        <button onClick={()=>castVote(0)}   disabled={loading} className="vote-btn vote-clear">Clear Vote</button>
      </div>
      {loading && <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:6, fontSize:11, color:'var(--text-dim)' }}><Spin size={11} /> Submitting...</div>}
    </div>
  );
}

// ── Composer ───────────────────────────────────────────────────────────

function Composer({ creds, parsed, threads, onPosted, fillRef }) {
  const toast = useToast();
  const [mode,     setMode]     = useState('new');
  const [threadId, setThreadId] = useState('');
  const [text,     setText]     = useState('');
  const [confirm,  setConfirm]  = useState(false);
  const [posting,  setPosting]  = useState(false);

  useEffect(() => {
    function onKey(e) { if (e.key==='Escape') setConfirm(false); }
    if (confirm) document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [confirm]);

  useEffect(() => {
    fillRef.current = (tid, txt) => {
      if (tid) { setMode('reply'); setThreadId(String(tid)); }
      if (txt) setText(txt);
    };
  }, []);

  const { repo, prId } = parsed;
  const base    = apiBase(parsed);
  const repoEnc = encodeURIComponent(repo);
  const replyable = threads.filter(t=>!t.isDeleted&&t.comments?.length);
  const canPost = text.trim().length > 0 && (mode==='new'||threadId);

  async function post() {
    setPosting(true);
    try {
      if (mode==='reply'&&threadId) {
        await adoPost(`${base}/repositories/${repoEnc}/pullrequests/${prId}/threads/${threadId}/comments?api-version=7.1`, creds.pat, { content:text, commentType:1 });
      } else {
        await adoPost(`${base}/repositories/${repoEnc}/pullrequests/${prId}/threads?api-version=7.1`, creds.pat, { comments:[{content:text,commentType:1}], status:1 });
      }
      toast('Comment posted', 'success');

    } catch(e) { toast(e.message, 'error'); setConfirm(false); }

  }

  return (

      <div className="panel-header" style={{ padding:'10px 14px' }}>

      </div>
      <div style={{ padding:14 }}>
        {/* Mode selector */}

            {replyable.map(t => {

              const f = t.threadContext?.filePath?.split('/').pop()||'';
              return <option key={t.id} value={t.id}>#{t.id}{f?` [${f}]`:''}: {preview}</option>;
            })}
          </select>
        )}

        <textarea value={text} onChange={e=>setText(e.target.value)} rows={4}
          className="inp" style={{ resize:'vertical', fontSize:12, lineHeight:1.6 }}
          placeholder="Write your comment... (AI Draft Reply pre-fills this)" />

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10 }}>
          <span style={{ fontSize:11, color:'var(--text-dim)' }}>{text.length} chars</span>
          <Btn onClick={()=>canPost&&setConfirm(true)} disabled={!canPost} variant="primary" size="sm">Post</Btn>
        </div>
      </div>

      {confirm && (
        <div className="modal-bg" style={{ position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center', zIndex:100, padding:16 }}>
          <div className="panel fade-up" style={{ width:'100%', maxWidth:440 }}>
            <div style={{ padding:'16px 20px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <h3 style={{ fontSize:14, fontWeight:600, color:'var(--text)', margin:0 }}>Confirm Post</h3>
              <kbd>Esc</kbd>
            </div>
            <div style={{ padding:20 }}>
              <p style={{ fontSize:12, color:'var(--text-muted)', marginBottom:12 }}>
                {mode==='reply'?`Replying to thread #${threadId} on PR #${prId}`:`New comment on PR #${prId}`}
              </p>
              <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 12px', fontSize:12, color:'var(--text)', maxHeight:160, overflowY:'auto', whiteSpace:'pre-wrap', lineHeight:1.6, fontFamily:'JetBrains Mono', marginBottom:16 }}>
                {text}
              </div>
              <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
                <Btn onClick={()=>setConfirm(false)} variant="secondary" size="sm">Cancel</Btn>
                <Btn onClick={post} disabled={posting} variant="primary" size="sm">
                  {posting ? <><Spin size={12} /> Posting...</> : 'Confirm and Post'}
                </Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Iteration banner ───────────────────────────────────────────────────

function IterationBanner({ pr, latestIteration, creds, parsed, onRefresh }) {
  const [newIter, setNewIter] = useState(false);

  useEffect(() => {
    if (!pr || !latestIteration) return;
    const base    = apiBase(parsed);
    const repoEnc = encodeURIComponent(parsed.repo);
    adoGet(`${base}/repositories/${repoEnc}/pullrequests/${parsed.prId}/iterations?api-version=7.1`, creds.pat)
      .then(resp => {
        const latest = resp.value?.[resp.value.length-1];
        if (latest && latest.id !== latestIteration.id) setNewIter(true);
      }).catch(()=>{});
  }, []);

  if (!newIter) return null;
  return (
    <div style={{ background:'rgba(210,153,34,0.08)', border:'1px solid rgba(210,153,34,0.25)', borderRadius:8, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }} className="fade-up">
      <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:999, background:'rgba(210,153,34,0.15)', color:'var(--amber)', border:'1px solid rgba(210,153,34,0.3)', flexShrink:0 }}>NEW PUSH</span>
      <span style={{ fontSize:12, color:'var(--amber)', flex:1 }}>New commits pushed since you loaded this PR. Refresh to see latest diff and threads.</span>
      <Btn onClick={onRefresh} variant="amber" size="xs">Refresh</Btn>
    </div>
  );
}

// ── PR Health Score ────────────────────────────────────────────────────
// Computes a score 0-100 from PR metadata. Shown as a ring in the header.

function computePRScore(pr, threads, changedFiles) {
  let score = 100;
  // Penalise for open threads
  const open = threads.filter(t=>['active','pending'].includes(t.status)).length;
  score -= Math.min(open * 8, 40);
  // Penalise for large PRs
  if (changedFiles.length > 20) score -= 20;
  else if (changedFiles.length > 10) score -= 10;
  // Penalise for no description
  if (!pr.description?.trim()) score -= 10;
  // Penalise for rejections
  const rejected = (pr.reviewers||[]).filter(r=>r.vote<0).length;
  score -= rejected * 12;
  return Math.max(0, Math.min(100, score));
}

function PRScoreRing({ score }) {
  const r = 14, circ = 2 * Math.PI * r;
  const fill = (score / 100) * circ;
  const color = score >= 75 ? 'var(--green)' : score >= 50 ? 'var(--amber)' : 'var(--red)';
  return (
    <div title={`PR Health: ${score}/100`} style={{ position:'relative', width:36, height:36, cursor:'default', flexShrink:0 }}>
      <svg width="36" height="36" viewBox="0 0 36 36">
        <circle cx="18" cy="18" r={r} fill="none" stroke="var(--border)" strokeWidth="3" />
        <circle cx="18" cy="18" r={r} fill="none" stroke={color} strokeWidth="3"
          strokeDasharray={`${fill} ${circ}`} strokeLinecap="round" className="score-ring" />
      </svg>
      <span style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:700, color, fontFamily:'JetBrains Mono' }}>{score}</span>
    </div>
  );
}

// ── Effort Estimator ───────────────────────────────────────────────────

function estimateEffort(changedFiles, threads) {
  const files = changedFiles.length;
  const open  = threads.filter(t=>['active','pending'].includes(t.status)).length;
  const score = files * 2 + open * 3;
  if (score <= 10) return { label:'Low', cls:'effort-low',    mins: '5-15 min' };
  if (score <= 30) return { label:'Medium', cls:'effort-medium', mins: '15-45 min' };
  return                  { label:'High', cls:'effort-high',   mins: '45+ min' };
}

// ── Team Conventions Panel ─────────────────────────────────────────────
// Lets the team define coding conventions that are injected into every AI prompt.
// Stored in sessionStorage (cleared with tab) — no external dependency.

function ConventionsPanel({ onConventionsChange }) {
  const STORAGE_KEY = 'pr_review_conventions';
  const [items, setItems] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
  });
  const [input, setInput] = useState('');
  const [open, setOpen] = useState(false);

  function add() {
    if (!input.trim()) return;
    const next = [...items, input.trim()];
    setItems(next);
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    onConventionsChange?.(next);
    setInput('');
  }
  function remove(i) {
    const next = items.filter((_,j)=>j!==i);
    setItems(next);
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    onConventionsChange?.(next);
  }

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
        <p className="slabel">Team Conventions</p>
        <button onClick={()=>setOpen(o=>!o)} style={{ fontSize:10, color:'var(--accent)', background:'none', border:'none', cursor:'pointer' }}>
          {open ? 'Hide' : 'Edit'}
        </button>
      </div>
      {items.length > 0 && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:open?8:0 }}>
          {items.map((item,i) => (
            <span key={i} className="convention-tag" style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
              {item}
              {open && <button onClick={()=>remove(i)} style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:10, padding:0, lineHeight:1 }}>x</button>}
            </span>
          ))}
        </div>
      )}
      {open && (
        <div style={{ display:'flex', gap:6, marginTop:4 }}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
            className="inp" style={{ fontSize:11, padding:'5px 8px', flex:1 }}
            placeholder="e.g. No print() in production code" />
          <Btn onClick={add} variant="primary" size="xs">Add</Btn>
        </div>
      )}
      {items.length === 0 && !open && (
        <p style={{ fontSize:11, color:'var(--text-dim)' }}>No conventions defined. Click Edit to add team-specific rules that Claude will always check.</p>
      )}
    </div>
  );
}

// ── Main Review View ───────────────────────────────────────────────────

function ReviewView({ creds, data, onBack }) {
  const toast = useToast();
  const { parsed, pr, changedFiles, iterations, latestIteration } = data;
  const [threads,    setThreads]    = useState(data.threads);
  const [selFile,    setSelFile]    = useState(null);
  const [filter,     setFilter]     = useState('all');
  const [modelId,    setModelId]    = useState(DEFAULT_MODEL);
  const [conventions, setConventions] = useState([]);
  const composerFill     = useRef(null);
  const diffContextCache = useRef({});
  // Cost tracking: per-model accumulation, never reset on model switch
  const [spentByModel, setSpentByModel] = useState({});

  function handleUsage(inTok, outTok) {
    setSpentByModel(p => {
      const prev = p[modelId] || { inTok:0, outTok:0 };
      return { ...p, [modelId]: { inTok: prev.inTok+inTok, outTok: prev.outTok+outTok } };
    });
  }
  function handleModelChange(id) { setModelId(id); } // intentionally no reset

  const totalCost = Object.entries(spentByModel).reduce((sum, [mid, t]) => sum + calcCost(t.inTok, t.outTok, mid), 0);
  const currentModelSpent = spentByModel[modelId] || { inTok:0, outTok:0 };
  const currentModelCost  = calcCost(currentModelSpent.inTok, currentModelSpent.outTok, modelId);
  function cacheDiffContext(path, text) { if (path&&text) diffContextCache.current[path]=text; }
  function getDiffContext(path) { return diffContextCache.current[path]||''; }

  async function refreshThreads() {
    try {
      const base = apiBase(parsed);
      const resp = await adoGet(`${base}/repositories/${encodeURIComponent(parsed.repo)}/pullrequests/${parsed.prId}/threads?api-version=7.1`, creds.pat);
      setThreads((resp.value||[]).filter(t=>!t.isDeleted));
      setLastRefreshed(new Date());
    } catch(e) { toast('Thread refresh failed: ' + e.message, 'error'); }
  }

  // Auto-refresh every 2 minutes, countdown shown in threads header
  const AUTO_REFRESH_SECS = 120;
  const [lastRefreshed,  setLastRefreshed]  = useState(new Date());
  const [countdown,      setCountdown]      = useState(AUTO_REFRESH_SECS);
  const [refreshing,     setRefreshing]     = useState(false);

  useEffect(() => {
    const tick = setInterval(() => {
      setCountdown(prev => {
        if (prev <= 1) {
          // trigger refresh
          setRefreshing(true);
          const base = apiBase(parsed);
          adoGet(`${base}/repositories/${encodeURIComponent(parsed.repo)}/pullrequests/${parsed.prId}/threads?api-version=7.1`, creds.pat)
            .then(resp => {
              setThreads((resp.value||[]).filter(t=>!t.isDeleted));
              setLastRefreshed(new Date());
            })
            .catch(()=>{})
            .finally(()=>setRefreshing(false));
          return AUTO_REFRESH_SECS;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(tick);
  }, []);

  async function manualRefresh() {
    setRefreshing(true);
    await refreshThreads().catch(()=>{});
    setRefreshing(false);
    setCountdown(AUTO_REFRESH_SECS);
  }

  function handleApply(threadId, text) {
    composerFill.current?.(threadId, text);
    document.getElementById('composer-anchor')?.scrollIntoView({ behavior:'smooth' });
  }

  const srcBranch  = (pr.sourceRefName||'').replace('refs/heads/','');
  const tgtBranch  = (pr.targetRefName||'').replace('refs/heads/','');
  const approved   = (pr.reviewers||[]).filter(r=>r.vote>0).length;
  const rejected   = (pr.reviewers||[]).filter(r=>r.vote<0).length;
  const waiting    = (pr.reviewers||[]).filter(r=>r.vote===0).length;
  const activeCount = threads.filter(t=>['active','pending'].includes(t.status)).length;

  const visible = threads.filter(t => {
    if (!t.comments?.length) return false;
    if (filter==='active')   return ['active','pending'].includes(t.status);
    if (filter==='resolved') return ['fixed','resolved','closed','byDesign','wontFix'].includes(t.status);
    return true;
  });

  // Resizable sidebar
  const sidebarRef = useRef(null);
  const dragging   = useRef(false);

  function onResizeStart(e) {
    dragging.current = true;
    e.currentTarget.classList.add('dragging');
    const handle = e.currentTarget;
    function onMove(ev) {
      if (!dragging.current) return;
      const newW = ev.clientX - sidebarRef.current.getBoundingClientRect().left;
      if (newW >= 180 && newW <= 420) sidebarRef.current.style.width = newW + 'px';
    }
    function onUp() { dragging.current = false; handle.classList.remove('dragging'); window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh', background:'var(--bg)' }}>
      {/* Header */}
      <header style={{ background:'var(--surface)', borderBottom:'1px solid var(--border)', padding:'0 16px', display:'flex', alignItems:'center', gap:12, height:52, position:'sticky', top:0, zIndex:30, flexShrink:0 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', fontSize:11, fontWeight:500, padding:'4px 8px', borderRadius:6, display:'flex', alignItems:'center', gap:4, transition:'all 0.15s' }}
          onMouseEnter={e=>{ e.currentTarget.style.background='var(--card)'; e.currentTarget.style.color='var(--text)'; }}
          onMouseLeave={e=>{ e.currentTarget.style.background='none'; e.currentTarget.style.color='var(--text-dim)'; }}>
          Back
        </button>

        <div style={{ width:1, height:20, background:'var(--border)' }} />

        {/* PR Health Score ring */}
        <PRScoreRing score={computePRScore(pr, threads, changedFiles)} />

        <div style={{ width:26, height:26, borderRadius:8, background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0d1117" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/>
          </svg>
        </div>

        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
            <span style={{ fontSize:13, fontWeight:600, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:400 }}>
              #{pr.pullRequestId}: {pr.title}
            </span>
            <span style={{ fontSize:11, fontFamily:'JetBrains Mono', color:'var(--text-dim)', flexShrink:0 }}>{srcBranch} &rarr; {tgtBranch}</span>
            <span style={{ fontSize:11, color:'var(--text-dim)' }}>by {pr.createdBy?.displayName}</span>
            <span style={{ fontSize:11, fontWeight:500, padding:'2px 8px', borderRadius:999, background: pr.status==='active'?'rgba(63,185,80,0.12)':'rgba(88,166,255,0.12)', color: pr.status==='active'?'var(--green)':'var(--accent)', border: `1px solid ${pr.status==='active'?'rgba(63,185,80,0.25)':'rgba(88,166,255,0.25)'}` }}>{pr.status}</span>
            {/* Effort estimate */}
            {(() => { const e=estimateEffort(changedFiles,threads); return <span className={`chip ${e.cls}`} title={`Estimated review effort: ${e.mins}`}>{e.label} effort</span>; })()}
          </div>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:14, flexShrink:0 }}>
          <div style={{ display:'flex', gap:10, fontSize:11 }}>
            <span style={{ color:'var(--green)', fontWeight:600 }}>{approved} A</span>
            <span style={{ color:'var(--red)',   fontWeight:600 }}>{rejected} R</span>
            <span style={{ color:'var(--text-dim)' }}>{waiting} W</span>
            <span style={{ background:'rgba(88,166,255,0.1)', color:'var(--accent)', padding:'2px 8px', borderRadius:999, fontWeight:500, border:'1px solid rgba(88,166,255,0.2)' }}>{activeCount} open</span>
          </div>

          {/* Model picker */}
          <div style={{ borderLeft:'1px solid var(--border)', paddingLeft:14 }}>
            <select value={modelId} onChange={e=>handleModelChange(e.target.value)}
              style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:6, padding:'4px 8px', fontSize:11, color:'var(--text)', outline:'none', fontFamily:'Geist, sans-serif', cursor:'pointer' }}>
              {MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
            <div style={{ fontSize:9, color:'var(--text-dim)', textAlign:'center', marginTop:2 }}>
              ${modelPricing(modelId).inPrice}/${modelPricing(modelId).outPrice}/MTok
            </div>
          </div>

          {/* Cost — never resets on model switch */}
          <div style={{ borderLeft:'1px solid var(--border)', paddingLeft:14 }}>
            <div style={{ fontSize:10, color:'var(--text-dim)', lineHeight:1.6 }}>
              <span>{modelPricing(modelId).label}: </span>
              <span style={{ fontFamily:'JetBrains Mono', fontWeight:600, color: currentModelCost>0?'var(--amber)':'var(--text-dim)' }}>{fmtCost(currentModelCost)}</span>
            </div>
            {totalCost > currentModelCost && (
              <div style={{ fontSize:10, color:'var(--text-dim)', lineHeight:1.6 }}>
                <span>Session: </span>
                <span style={{ fontFamily:'JetBrains Mono', fontWeight:600, color:'var(--purple)' }}>{fmtCost(totalCost)}</span>
              </div>
            )}
          </div>
        </div>
      </header>

      <div style={{ display:'flex', flex:1, overflow:'hidden', height:'calc(100vh - 52px)' }}>
        {/* Sidebar */}
        <aside ref={sidebarRef} id="sidebar" style={{ background:'var(--surface)', borderRight:'1px solid var(--border)', overflowY:'auto', padding:'16px 14px', display:'flex', flexDirection:'column', gap:20, flexShrink:0 }}>
          {/* PR description */}
          {pr.description && (
            <div>
              <p className="slabel" style={{ marginBottom:6 }}>Description</p>
              <p style={{ fontSize:11, color:'var(--text-muted)', lineHeight:1.6, overflow:'hidden', display:'-webkit-box', WebkitLineClamp:5, WebkitBoxOrient:'vertical' }}>{pr.description}</p>
            </div>
          )}

          {/* Reviewers */}
          {pr.reviewers?.length > 0 && (
            <div>
              <p className="slabel" style={{ marginBottom:8 }}>Reviewers</p>
              {pr.reviewers.map(r => (
                <div key={r.id} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>

                  <span style={{ fontSize:11, color:'var(--text-muted)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.displayName}</span>

                  title="Refresh threads now"
                  style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:500, background:'var(--surface)', border:'1px solid var(--border)', color:'var(--text-muted)', cursor:'pointer', transition:'all 0.15s', opacity: refreshing ? 0.5 : 1 }}
                  onMouseEnter={e=>{ e.currentTarget.style.background='var(--card)'; e.currentTarget.style.color='var(--text)'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background='var(--surface)'; e.currentTarget.style.color='var(--text-muted)'; }}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                    style={{ animation: refreshing ? 'spin 0.7s linear infinite' : 'none' }}>
                    <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                  </svg>
                  Refresh
                </button>
              </div>
            </div>

            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {visible.length === 0 ? (
                <div className="panel" style={{ padding:40, textAlign:'center' }}>
                  <p style={{ fontSize:13, color:'var(--text-muted)', margin:0 }}>No threads match this filter</p>
                </div>
              ) : visible.map(t => (
                <ThreadCard key={t.id} thread={t} creds={creds} prTitle={pr.title}
                  onApply={handleApply} onSelectFile={setSelFile} onUsage={handleUsage}
                  model={modelId} parsed={parsed}
                  diffContext={getDiffContext(t.threadContext?.filePath?.replace(/^\//,'')||'')} />
              ))}
            </div>
          </div>

          {/* Composer */}
          <div id="composer-anchor">
            <Composer creds={creds} parsed={parsed} threads={threads} onPosted={refreshThreads} fillRef={composerFill} />
          </div>
        </main>
      </div>
    </div>
  );
}

// ── File origin guard ──────────────────────────────────────────────────

function FileOriginBanner() {
  return (
    <div className="auth-bg" style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
      <div className="panel fade-up" style={{ width:'100%', maxWidth:400, textAlign:'center', overflow:'hidden' }}>
        <div style={{ background:'rgba(248,81,73,0.08)', borderBottom:'1px solid var(--border)', padding:'24px 24px 20px' }}>
          <div style={{ width:36, height:36, borderRadius:10, background:'rgba(248,81,73,0.15)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px' }}>
            <span style={{ fontSize:16, fontWeight:700, color:'var(--red)' }}>!</span>
          </div>
          <h1 style={{ fontSize:15, fontWeight:700, color:'var(--text)', margin:'0 0 6px' }}>Cannot run from file://</h1>
          <p style={{ fontSize:12, color:'var(--text-muted)', margin:0 }}>Browsers block cross-origin requests from local files.</p>
        </div>
        <div style={{ padding:20 }}>
          <div style={{ background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 14px', marginBottom:16, textAlign:'left' }}>
            <p style={{ fontSize:10, color:'var(--text-dim)', margin:'0 0 4px' }}>Run in your terminal:</p>
            <code style={{ fontFamily:'JetBrains Mono', fontSize:12, color:'var(--green)' }}>python3 -m http.server 8080</code>
          </div>
          <p style={{ fontSize:12, color:'var(--text-muted)', margin:0 }}>
            Then open{' '}
            <a href="http://localhost:8080/pr_review_v6.html" style={{ color:'var(--accent)' }}>
              http://localhost:8080/pr_review_v6.html
            </a>
          </p>
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────

function App() {
  const [creds,  setCreds]  = useState(null);
  const [prData, setPrData] = useState(null);

  if (location.protocol === 'file:') return <FileOriginBanner />;
  if (!creds)  return <CredentialsPanel onSave={setCreds} />;
  if (!prData) return <PRFetchPanel creds={creds} onFetch={setPrData} onReset={()=>setCreds(null)} />;
  return <ReviewView creds={creds} data={prData} onBack={()=>setPrData(null)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <React.StrictMode>
    <ToastProvider>
      <App />
    </ToastProvider>
  </React.StrictMode>
);
</script>
</body>
</html>
