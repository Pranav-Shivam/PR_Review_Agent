<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Review Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --card:      #1c2128;
    --border:    #30363d;
    --border-sub:#21262d;
    --text:      #e6edf3;
    --text-muted:#848d97;
    --text-dim:  #484f58;
    --accent:    #58a6ff;
    --accent-dim:#1f3a5f;
    --green:     #3fb950;
    --green-dim: #12261e;
    --red:       #f85149;
    --red-dim:   #2a1515;
    --amber:     #d29922;
    --amber-dim: #2a1f0a;
    --purple:    #bc8cff;
    --purple-dim:#2d2040;
  }

  * { font-family: 'Geist', sans-serif; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); }

  /* Scrollbars */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Diff table */
  .code-table { font-family: 'JetBrains Mono', monospace; font-size: 12px; width: 100%; border-collapse: collapse; }
  .code-table td { padding: 1px 8px; white-space: pre; vertical-align: top; }
  .ln { color: var(--text-dim); text-align: right; min-width: 42px; user-select: none;
        border-right: 1px solid var(--border-sub); padding-right: 10px; }
  .diff-add { background: rgba(63,185,80,0.1); }
  .diff-del { background: rgba(248,81,73,0.1); }
  .diff-ctx { background: transparent; }
  .diff-row-selectable { cursor: pointer; position: relative; }
  .diff-row-selectable:hover td { background: rgba(88,166,255,0.08) !important; }
  .diff-row-selected td { background: rgba(88,166,255,0.16) !important;
    outline: 1px solid rgba(88,166,255,0.4); outline-offset: -1px; }
  .hunk-row td { background: var(--accent-dim); color: var(--accent);
    font-style: normal; padding: 3px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.02em; }
  .sign-add { color: var(--green); min-width: 16px; text-align: center; font-family: 'JetBrains Mono', monospace; }
  .sign-del { color: var(--red);   min-width: 16px; text-align: center; font-family: 'JetBrains Mono', monospace; }
  .sign-ctx { color: var(--text-dim); min-width: 16px; text-align: center; }

  /* Input */
  .inp {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; font-size: 13px; color: var(--text);
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    font-family: 'Geist', sans-serif;
  }
  .inp::placeholder { color: var(--text-dim); }
  .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }

  /* Skeleton shimmer */
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
    background-size: 400px 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: 4px;
  }

  /* AI markdown output */
  .md-body { font-size: 13px; line-height: 1.7; color: var(--text); }
  .md-body h1,.md-body h2,.md-body h3 { font-weight: 600; margin: 12px 0 6px; color: var(--text); }
  .md-body h1 { font-size: 15px; }
  .md-body h2 { font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .md-body h3 { font-size: 13px; color: var(--accent); }
  .md-body p  { margin: 6px 0; }
  .md-body ul,.md-body ol { margin: 6px 0 6px 18px; }
  .md-body li { margin: 3px 0; }
  .md-body strong { font-weight: 600; color: var(--text); }
  .md-body em { font-style: italic; color: #cdd9e5; }
  .md-body code {
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 1px 5px; border-radius: 4px; color: #e3b341;
  }
  .md-body pre {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; overflow-x: auto; margin: 10px 0;
  }
  .md-body pre code {
    background: none; border: none; padding: 0; color: var(--text); font-size: 12px;
  }
  .md-body blockquote {
    border-left: 3px solid var(--accent); padding-left: 12px;
    margin: 8px 0; color: var(--text-muted);
  }
  .md-body a { color: var(--accent); text-decoration: underline; }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* Toast */
  @keyframes slideIn  { from { transform: translateX(110%); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity:1; } to { transform: translateX(110%); opacity:0; } }
  .toast-enter { animation: slideIn  0.25s ease-out forwards; }
  .toast-exit  { animation: slideOut 0.25s ease-in  forwards; }

  /* Cards & panels */
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
  .panel-header { background: var(--surface); border-bottom: 1px solid var(--border); border-radius: 10px 10px 0 0; }

  /* Thread card hover */
  .thread-card { transition: border-color 0.15s, box-shadow 0.15s; }
  .thread-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(88,166,255,0.15); }

  /* Fade in */
  @keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.2s ease-out forwards; }

  /* Section label */
  .slabel { font-size: 10px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em; }

  /* Status chip */
  .chip { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px;
    border: 1px solid; display: inline-flex; align-items: center; }
  .chip-active   { background: rgba(88,166,255,0.12);  color: var(--accent);  border-color: rgba(88,166,255,0.3);  }
  .chip-pending  { background: rgba(210,153,34,0.12);  color: var(--amber);   border-color: rgba(210,153,34,0.3);  }
  .chip-fixed    { background: rgba(63,185,80,0.12);   color: var(--green);   border-color: rgba(63,185,80,0.3);   }
  .chip-resolved { background: rgba(132,141,151,0.12); color: var(--text-muted); border-color: rgba(132,141,151,0.3); }
  .chip-closed   { background: rgba(72,79,88,0.2);     color: var(--text-dim); border-color: var(--border); }
  .chip-bydesign { background: rgba(188,140,255,0.12); color: var(--purple);  border-color: rgba(188,140,255,0.3); }
  .chip-wontfix  { background: rgba(248,81,73,0.12);   color: var(--red);     border-color: rgba(248,81,73,0.3);   }

  /* Severity rows */
  .sev-critical { background: rgba(248,81,73,0.08);  border-left: 3px solid var(--red);    border-radius: 0 6px 6px 0; }
  .sev-high     { background: rgba(210,153,34,0.08); border-left: 3px solid var(--amber);  border-radius: 0 6px 6px 0; }
  .sev-medium   { background: rgba(88,166,255,0.07); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; }
  .sev-info     { background: rgba(63,185,80,0.07);  border-left: 3px solid var(--green);  border-radius: 0 6px 6px 0; }

  /* Vote buttons */
  .vote-btn { font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 6px;
    border: 1px solid; width: 100%; text-align: left; transition: all 0.15s; cursor: pointer; }
  .vote-approve { background: rgba(63,185,80,0.1);   color: var(--green);  border-color: rgba(63,185,80,0.25);  }
  .vote-approve:hover:not(:disabled) { background: rgba(63,185,80,0.2); }
  .vote-suggest { background: rgba(88,166,255,0.1);  color: var(--accent); border-color: rgba(88,166,255,0.25); }
  .vote-suggest:hover:not(:disabled) { background: rgba(88,166,255,0.2); }
  .vote-reject  { background: rgba(248,81,73,0.1);   color: var(--red);    border-color: rgba(248,81,73,0.25);  }
  .vote-reject:hover:not(:disabled)  { background: rgba(248,81,73,0.2);  }
  .vote-clear   { background: transparent; color: var(--text-muted); border-color: var(--border); }
  .vote-clear:hover:not(:disabled)   { background: var(--surface); }

  /* Resizable sidebar */
  #sidebar { width: 260px; min-width: 180px; max-width: 420px; }
  .resize-handle {
    width: 4px; cursor: col-resize; background: transparent;
    transition: background 0.15s; flex-shrink: 0;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

  /* Btn base */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-family: 'Geist', sans-serif; font-weight: 500; border-radius: 6px;
    transition: all 0.15s; cursor: pointer; border: 1px solid transparent;
    white-space: nowrap; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-xs  { font-size: 11px; padding: 4px 10px; }
  .btn-sm  { font-size: 12px; padding: 5px 12px; }
  .btn-md  { font-size: 13px; padding: 8px 16px; }
  .btn-primary  { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled)  { background: #79b8ff; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover:not(:disabled){ background: var(--card); border-color: #484f58; }
  .btn-ghost    { background: transparent; color: var(--text-muted); border-color: transparent; }
  .btn-ghost:hover:not(:disabled)    { background: var(--surface); color: var(--text); }
  .btn-danger   { background: rgba(248,81,73,0.15); color: var(--red); border-color: rgba(248,81,73,0.3); }
  .btn-danger:hover:not(:disabled)   { background: rgba(248,81,73,0.25); }
  .btn-violet   { background: rgba(188,140,255,0.15); color: var(--purple); border-color: rgba(188,140,255,0.3); }
  .btn-violet:hover:not(:disabled)   { background: rgba(188,140,255,0.25); }
  .btn-green    { background: rgba(63,185,80,0.15); color: var(--green); border-color: rgba(63,185,80,0.3); }
  .btn-green:hover:not(:disabled)    { background: rgba(63,185,80,0.25); }
  .btn-amber    { background: rgba(210,153,34,0.15); color: var(--amber); border-color: rgba(210,153,34,0.3); }
  .btn-amber:hover:not(:disabled)    { background: rgba(210,153,34,0.25); }

  /* Tabs */
  .tab { font-size: 12px; font-weight: 500; padding: 8px 14px; border-bottom: 2px solid transparent;
    color: var(--text-muted); transition: all 0.15s; cursor: pointer; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Kbd hint */
  kbd { font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 4px; color: var(--text-muted); }

  /* Modal backdrop */
  .modal-bg { background: rgba(1,4,9,0.7); backdrop-filter: blur(4px); }

  /* Auth screen grid pattern */
  .auth-bg {
    background-color: var(--bg);
    background-image: radial-gradient(var(--border-sub) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* Pulse dot for loading */
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pulse-dot { animation: pulse-dot 1.2s ease-in-out infinite; }
  .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.4s; }

  /* PR score ring */
  .score-ring { transform-origin: center; transform: rotate(-90deg); }

  /* Drag & drop zone */
  .drop-zone { border: 2px dashed var(--border); border-radius: 8px; transition: all 0.2s; }
  .drop-zone.over { border-color: var(--accent); background: rgba(88,166,255,0.06); }

  /* Conventions tag */
  .convention-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 4px; background: rgba(188,140,255,0.1); color: var(--purple); border: 1px solid rgba(188,140,255,0.2); white-space: nowrap; }

  /* Effort badge */
  .effort-low    { background: rgba(63,185,80,0.1);  color: var(--green);  border: 1px solid rgba(63,185,80,0.25);  }
  .effort-medium { background: rgba(210,153,34,0.1); color: var(--amber);  border: 1px solid rgba(210,153,34,0.25); }
  .effort-high   { background: rgba(248,81,73,0.1);  color: var(--red);    border: 1px solid rgba(248,81,73,0.25);  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ── Toast context ──────────────────────────────────────────────────────

const ToastCtx = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type = 'info', duration = 3500) => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type, exiting: false }]);
    setTimeout(() => {
      setToasts(p => p.map(t => t.id === id ? { ...t, exiting: true } : t));
      setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 280);
    }, duration);
  }, []);
  return (
    <ToastCtx.Provider value={add}>
      {children}
      <div className="fixed bottom-5 right-5 z-[200] flex flex-col gap-2 pointer-events-none" style={{maxWidth:'360px'}}>
        {toasts.map(t => (
          <ToastItem key={t.id} toast={t} onDismiss={() => setToasts(p => p.filter(x => x.id !== t.id))} />
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

function ToastItem({ toast, onDismiss }) {
  const colors = {
    success: { bg: 'rgba(63,185,80,0.15)',  border: 'rgba(63,185,80,0.35)',  text: '#3fb950', icon: 'ok' },
    error:   { bg: 'rgba(248,81,73,0.15)',  border: 'rgba(248,81,73,0.35)',  text: '#f85149', icon: 'x' },
    info:    { bg: 'rgba(88,166,255,0.12)', border: 'rgba(88,166,255,0.3)',  text: '#58a6ff', icon: 'i' },
    warn:    { bg: 'rgba(210,153,34,0.15)', border: 'rgba(210,153,34,0.35)', text: '#d29922', icon: '!' },
  };
  const c = colors[toast.type] || colors.info;
  return (
    <div className={`pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-lg border backdrop-blur-sm ${toast.exiting ? 'toast-exit' : 'toast-enter'}`}
      style={{ background: c.bg, borderColor: c.border }}>
      <span style={{ color: c.text, fontWeight: 700, fontSize: 12, marginTop: 1, fontFamily: 'JetBrains Mono' }}>{c.icon}</span>
      <span style={{ fontSize: 13, color: 'var(--text)', flex: 1, lineHeight: 1.5 }}>{toast.msg}</span>
      <button onClick={onDismiss} style={{ color: 'var(--text-dim)', fontSize: 11, marginTop: 1 }}>x</button>
    </div>
  );
}

function useToast() { return useContext(ToastCtx); }

// ── ADO REST helpers ───────────────────────────────────────────────────

function b64(pat) { return 'Basic ' + btoa(':' + pat); }

function parsePrUrl(raw) {
  const m = raw.trim().match(/https?:\/\/dev\.azure\.com\/([^/]+)\/([^/]+)\/_git\/([^/]+)\/pullrequest\/(\d+)/i);
  if (!m) throw new Error('Invalid URL. Expected: https://dev.azure.com/{org}/{project}/_git/{repo}/pullrequest/{id}');
  return { org: decodeURIComponent(m[1]), project: decodeURIComponent(m[2]), repo: decodeURIComponent(m[3]), prId: parseInt(m[4]) };
}

function apiBase({ org, project }) {
  return `https://dev.azure.com/${encodeURIComponent(org)}/${encodeURIComponent(project)}/_apis/git`;
}

async function adoGet(url, pat) {
  const r = await fetch(url, { headers: { Authorization: b64(pat), Accept: 'application/json' } });
  if (!r.ok) { const t = await r.text().catch(() => ''); throw new Error(`ADO ${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}
async function adoPost(url, pat, body) {
  const r = await fetch(url, { method:'POST', headers:{ Authorization:b64(pat), 'Content-Type':'application/json', Accept:'application/json' }, body:JSON.stringify(body) });
  if (!r.ok) { const t = await r.text().catch(()=>''); throw new Error(`ADO ${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}
async function adoPatch(url, pat, body) {
  const r = await fetch(url, { method:'PATCH', headers:{ Authorization:b64(pat), 'Content-Type':'application/json', Accept:'application/json' }, body:JSON.stringify(body) });
  if (!r.ok) { const t = await r.text().catch(()=>''); throw new Error(`ADO ${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}
async function adoPut(url, pat, body) {
  const r = await fetch(url, { method:'PUT', headers:{ Authorization:b64(pat), 'Content-Type':'application/json', Accept:'application/json' }, body:JSON.stringify(body) });
  if (!r.ok) { const t = await r.text().catch(()=>''); throw new Error(`ADO ${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}

// ── Claude helper ──────────────────────────────────────────────────────

async function claude(apiKey, prompt, modelId = 'claude-sonnet-4-6', maxTokens = 1500) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true', 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: modelId, max_tokens: maxTokens, messages: [{ role: 'user', content: prompt }] }),
  });
  if (!r.ok) { const t = await r.text().catch(()=>''); throw new Error(`Claude ${r.status}: ${t.slice(0,300)}`); }
  const d = await r.json();
  return { text: d.content[0].text, inputTokens: d.usage?.input_tokens||0, outputTokens: d.usage?.output_tokens||0 };
}

// ── Models & pricing ──────────────────────────────────────────────────

const MODELS = [
  { id: 'claude-haiku-4-5-20251001',  label: 'Haiku 4.5',   inPrice: 0.80,  outPrice: 4.00  },
  { id: 'claude-sonnet-4-5-20251019', label: 'Sonnet 4.5',  inPrice: 3.00,  outPrice: 15.00 },
  { id: 'claude-sonnet-4-6',          label: 'Sonnet 4.6',  inPrice: 3.00,  outPrice: 15.00 },
  { id: 'claude-opus-4-6',            label: 'Opus 4.6',    inPrice: 15.00, outPrice: 75.00 },
];
const DEFAULT_MODEL = 'claude-sonnet-4-6';
function modelPricing(id) { return MODELS.find(m => m.id === id) || MODELS[2]; }
function calcCost(inTok, outTok, id) { const p = modelPricing(id); return (inTok/1e6)*p.inPrice + (outTok/1e6)*p.outPrice; }
function fmtCost(usd) { if (usd===0) return '$0.0000'; if (usd<0.0001) return '<$0.0001'; return '$'+usd.toFixed(4); }

// ── Utilities ──────────────────────────────────────────────────────────

function relTime(iso) {
  if (!iso) return '';
  const m = Math.floor((Date.now()-new Date(iso))/60000);
  if (m<1) return 'just now';
  if (m<60) return `${m}m ago`;
  const h = Math.floor(m/60);
  if (h<24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}
function initials(name) { return (name||'?').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function changeLabel(ct) {
  if (!ct) return ['EDIT','amber'];
  if (ct & 4) return ['DEL','red'];
  if (ct & 1) return ['ADD','green'];
  if (ct & 8) return ['REN','purple'];
  return ['EDIT','amber'];
}
const STATUS_CHIP = { active:'chip-active', pending:'chip-pending', fixed:'chip-fixed', resolved:'chip-resolved', closed:'chip-closed', byDesign:'chip-bydesign', wontFix:'chip-wontfix' };

// ── Markdown renderer ──────────────────────────────────────────────────
// Lightweight parser: handles headers, bold, italic, code blocks, inline code, lists, blockquotes, hr, links

function parseMarkdown(text) {
  if (!text) return '';
  const escape = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = text.split('\n');
  const out = [];
  let i = 0;

  function inlineFormat(s) {
    // code spans first
    s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${escape(c)}</code>`);
    // bold+italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // bold
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // italic
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/_(.+?)_/g, '<em>$1</em>');
    // links
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    return s;
  }

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    if (line.startsWith('```')) {
      const lang = line.slice(3).trim();
      const codeLines = [];
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) { codeLines.push(escape(lines[i])); i++; }
      out.push(`<pre><code${lang ? ` class="language-${lang}"` : ''}>${codeLines.join('\n')}</code></pre>`);
      i++;
      continue;
    }

    // HR
    if (/^[-*_]{3,}$/.test(line.trim())) { out.push('<hr>'); i++; continue; }

    // Headings
    const hm = line.match(/^(#{1,3})\s+(.*)/);
    if (hm) { const lvl=hm[1].length; out.push(`<h${lvl}>${inlineFormat(hm[2])}</h${lvl}>`); i++; continue; }

    // Blockquote
    if (line.startsWith('> ')) {
      const bqLines = [];
      while (i < lines.length && lines[i].startsWith('> ')) { bqLines.push(lines[i].slice(2)); i++; }
      out.push(`<blockquote>${inlineFormat(bqLines.join('<br>'))}</blockquote>`);
      continue;
    }

    // Unordered list
    if (/^[-*+]\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^[-*+]\s/.test(lines[i])) {
        items.push(`<li>${inlineFormat(lines[i].replace(/^[-*+]\s/,''))}</li>`); i++;
      }
      out.push(`<ul>${items.join('')}</ul>`);
      continue;
    }

    // Ordered list
    if (/^\d+\.\s/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
        items.push(`<li>${inlineFormat(lines[i].replace(/^\d+\.\s/,''))}</li>`); i++;
      }
      out.push(`<ol>${items.join('')}</ol>`);
      continue;
    }

    // Empty line
    if (line.trim() === '') { i++; continue; }

    // Paragraph
    const pLines = [];
    while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#') && !lines[i].startsWith('```') && !/^[-*+]\s/.test(lines[i]) && !/^\d+\.\s/.test(lines[i]) && !lines[i].startsWith('>') && !/^[-*_]{3,}$/.test(lines[i].trim())) {
      pLines.push(inlineFormat(lines[i])); i++;
    }
    if (pLines.length) out.push(`<p>${pLines.join('<br>')}</p>`);
  }
  return out.join('\n');
}

// ── Diff engine ────────────────────────────────────────────────────────

function computeClientDiff(oldText, newText, ctxLines = 3) {
  const oldL = oldText ? oldText.split('\n') : [];
  const newL = newText ? newText.split('\n') : [];
  const m = oldL.length, n = newL.length;
  if (m === 0) return newL.map((t, i) => ({ type:'add', mln:i+1, t }));
  if (n === 0) return oldL.map((t, i) => ({ type:'del', oln:i+1, t }));
  if (oldText === newText) return [{ hunk:'Files are identical — no differences.' }];
  const CAP = 2000;
  if (m > CAP || n > CAP) return [
    { hunk:`File too large for inline diff (${m}x${n} lines).` },
    ...oldL.map((t,i)=>({type:'del',oln:i+1,t})),
    ...newL.map((t,i)=>({type:'add',mln:i+1,t})),
  ];
  const dp = [];
  for (let i = 0; i <= m; i++) dp[i] = new Uint32Array(n + 1);
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oldL[i-1]===newL[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i>0 && j>0 && oldL[i-1]===newL[j-1]) { ops.push({type:'ctx',oln:i,mln:j,t:oldL[i-1]}); i--; j--; }
    else if (j>0 && (i===0||dp[i][j-1]>=dp[i-1][j])) { ops.push({type:'add',mln:j,t:newL[j-1]}); j--; }
    else { ops.push({type:'del',oln:i,t:oldL[i-1]}); i--; }
  }
  ops.reverse();
  const vis = new Uint8Array(ops.length);
  for (let k = 0; k < ops.length; k++)
    if (ops[k].type !== 'ctx')
      for (let c = Math.max(0,k-ctxLines); c <= Math.min(ops.length-1,k+ctxLines); c++) vis[c] = 1;
  const rows = [];
  let skipping = false;
  for (let k = 0; k < ops.length; k++) {
    if (!vis[k]) { skipping = true; continue; }
    if (skipping || k === 0) { const op=ops[k]; rows.push({hunk:`@@ -${op.oln||'?'} +${op.mln||'?'} @@`}); skipping=false; }
    rows.push(ops[k]);
  }
  return rows;
}

function adoBlocksToRows(blocks) {
  const rows = [];
  for (const { changeType=0, mLines=[], oLines=[], modifiedStart=1, originalStart=1, originalCount=0, modifiedCount=0 } of blocks) {
    if (changeType === 0) {
      rows.push({hunk:`@@ -${originalStart},${originalCount} +${modifiedStart},${modifiedCount} @@`});
      mLines.forEach((t,i) => rows.push({type:'ctx',oln:originalStart+i,mln:modifiedStart+i,t}));
    } else if (changeType === 1) { mLines.forEach((t,i) => rows.push({type:'add',mln:modifiedStart+i,t})); }
    else if (changeType === 2) { oLines.forEach((t,i) => rows.push({type:'del',oln:originalStart+i,t})); }
    else {
      oLines.forEach((t,i) => rows.push({type:'del',oln:originalStart+i,t}));
      mLines.forEach((t,i) => rows.push({type:'add',mln:modifiedStart+i,t}));
    }
  }
  return rows;
}

function PRFetchPanel({ creds, onFetch, onReset }) {
  const [url,     setUrl]     = useState('');
  const [loading, setLoading] = useState(false);
  const [err,     setErr]     = useState('');

  async function load() {
    if (!url.trim()) return;
    setErr(''); setLoading(true);
    try {
      const parsed = parsePrUrl(url);
      const { repo, prId } = parsed;
      const base    = apiBase(parsed);
      const repoEnc = encodeURIComponent(repo);

      const [pr, threadsResp, itersResp] = await Promise.all([
        adoGet(`${base}/repositories/${repoEnc}/pullrequests/${prId}?api-version=7.1`, creds.pat),
        adoGet(`${base}/repositories/${repoEnc}/pullrequests/${prId}/threads?api-version=7.1`, creds.pat),
        adoGet(`${base}/repositories/${repoEnc}/pullrequests/${prId}/iterations?api-version=7.1`, creds.pat),
      ]);

      let changedFiles = [], latestIteration = null;
      if (itersResp.value?.length) {
        latestIteration = itersResp.value[itersResp.value.length - 1];
        const changesResp = await adoGet(
          `${base}/repositories/${repoEnc}/pullrequests/${prId}/iterations/${latestIteration.id}/changes?api-version=7.1`, creds.pat
        );
        changedFiles = (changesResp.changeEntries||[]).filter(e=>e.item?.path)
          .map(e => ({ path: e.item.path.replace(/^\//,''), changeType: e.changeType }));
      }

      onFetch({ parsed, pr, threads:(threadsResp.value||[]).filter(t=>!t.isDeleted), changedFiles, iterations:itersResp.value||[], latestIteration });
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  }

  return (
    <div className="auth-bg" style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
      <div className="panel fade-up" style={{ width:'100%', maxWidth:440 }}>
        <div style={{ padding:'20px 24px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <h2 style={{ fontSize:14, fontWeight:600, color:'var(--text)', margin:0 }}>Load Pull Request</h2>
          <button onClick={onReset} style={{ fontSize:11, color:'var(--text-dim)', background:'none', border:'none', cursor:'pointer', padding:'4px 8px', borderRadius:6 }}
            onMouseEnter={e=>e.target.style.color='var(--red)'} onMouseLeave={e=>e.target.style.color='var(--text-dim)'}>
            Back to credentials
          </button>
        </div>
        <div style={{ padding:24 }}>
          {err && (
            <div style={{ background:'rgba(248,81,73,0.1)', border:'1px solid rgba(248,81,73,0.3)', borderRadius:8, padding:'10px 14px', fontSize:12, color:'var(--red)', marginBottom:16 }}>
              {err}
            </div>
          )}
          <Field label="Pull Request URL">
            <input value={url} onChange={e=>setUrl(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&load()}
              className="inp" placeholder="https://dev.azure.com/org/project/_git/repo/pullrequest/123" />
          </Field>
          <Btn onClick={load} disabled={loading||!url.trim()} variant="primary" size="md" style={{ width:'100%', marginTop:14 }}>
            {loading ? <><Spin size={13} /> Fetching...</> : 'Fetch PR'}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ── Diff viewer ────────────────────────────────────────────────────────

function DiffViewer({ creds, parsed, pr, filePath, latestIteration, onUsage, model, onDiffLoaded }) {
  const toast = useToast();
  const [tab,           setTab]           = useState('diff');
  const [rows,          setRows]          = useState(null);
  const [full,          setFull]          = useState(null);
  const [loading,       setLoading]       = useState(false);
  const [selLines,      setSelLines]      = useState([]);
  const [inlineAI,      setInlineAI]      = useState('');
  const [inlineLoading, setInlineLoading] = useState(false);
  const [fileSummary,   setFileSummary]   = useState('');
  const [summLoading,   setSummLoading]   = useState(false);
  const [postLoading,   setPostLoading]   = useState(false);
  const [oldText,       setOldText]       = useState('');
  const [newText,       setNewText]       = useState('');

  const base    = apiBase(parsed);
  const repoEnc = encodeURIComponent(parsed.repo);
  const repoId  = pr.repository?.id || parsed.repo;

  useEffect(() => {
    setRows(null); setFull(null); setTab('diff'); setSelLines([]);
    setInlineAI(''); setFileSummary(''); setOldText(''); setNewText('');
    if (filePath) loadDiff(filePath);
  }, [filePath]);

  async function fetchText(path, commitId) {
    const res = await fetch(
      `${base}/repositories/${repoEnc}/items?path=${encodeURIComponent('/'+path)}&versionDescriptor.version=${encodeURIComponent(commitId)}&versionDescriptor.versionType=commit&api-version=7.1`,
      { headers: { Authorization: b64(creds.pat), Accept: 'text/plain' } }
    );
    if (!res.ok) throw new Error(`items API ${res.status}`);
    return res.text();
  }

  async function loadDiff(path) {
    setLoading(true);
    try {
      const src = pr.lastMergeSourceCommit?.commitId;
      const tgt = pr.lastMergeTargetCommit?.commitId;
      if (!src || !tgt) throw new Error('PR is missing commit SHAs.');

      let adoRows = null;
      try {
        const diffBase = `https://dev.azure.com/${encodeURIComponent(parsed.org)}/${encodeURIComponent(parsed.project)}/_apis/git`;
        const data = await adoGet(
          `${diffBase}/repositories/${repoId}/diffs/commits?baseVersion=${tgt}&targetVersion=${src}&baseVersionType=commit&targetVersionType=commit&path=${encodeURIComponent('/'+path)}&$top=1000&api-version=7.1`,
          creds.pat
        );
        if (data.blocks?.length) adoRows = adoBlocksToRows(data.blocks);
      } catch(_) {}

      const [oldR, newR] = await Promise.allSettled([ fetchText(path, tgt), fetchText(path, src) ]);
      const ot = oldR.status==='fulfilled' ? oldR.value : '';
      const nt = newR.status==='fulfilled' ? newR.value : '';
      setOldText(ot); setNewText(nt); setFull(nt || ot);

      if (adoRows) {
        setRows(adoRows);
        const dt = adoRows.filter(r=>!r.hunk&&r.type!=='ctx').map(r=>(r.type==='add'?'+':'-')+r.t).join('\n');
        onDiffLoaded?.(path, dt);
        return;
      }
      const cr = computeClientDiff(ot, nt);
      setRows(cr);
      const dt = cr.filter(r=>!r.hunk&&r.type!=='ctx').map(r=>(r.type==='add'?'+':'-')+r.t).join('\n');
      onDiffLoaded?.(path, dt);
    } catch(e) {
      toast(e.message, 'error'); setRows([]);
    } finally { setLoading(false); }
  }

  function toggleLine(idx) {
    setSelLines(prev => prev.includes(idx) ? prev.filter(i=>i!==idx) : [...prev, idx]);
    setInlineAI('');
  }
  function clearSel() { setSelLines([]); setInlineAI(''); }

  function getSelectedCode() {
    if (!rows) return '';
    return [...selLines].sort((a,b)=>a-b).map(i => {
      const row = rows[i]; if (!row||row.hunk) return '';
      return (row.type==='add'?'+':row.type==='del'?'-':' ')+row.t;
    }).filter(Boolean).join('\n');
  }

  async function runInlineAI(action) {
    const code = getSelectedCode();
    if (!code.trim() || selLines.length === 0) return;
    setInlineLoading(true); setInlineAI('');
    try {
      const firstRow = rows[Math.min(...selLines)];
      const lineNum  = firstRow?.mln || firstRow?.oln || '?';
      let prompt = `You are reviewing a pull request.\nPR: "${pr.title}"`;
      if (creds.context) prompt += `\nContext: ${creds.context}`;
      if (filePath) prompt += `\nFile: ${filePath} (line ${lineNum})`;
      prompt += `\n\nSelected code:\n\`\`\`\n${code}\n\`\`\`\n\n`;
      if (action==='explain') prompt += 'Explain what this code does and highlight any concerns. Use markdown formatting.';
      else if (action==='suggest') prompt += 'Suggest a concrete improvement or fix. Include a code snippet of the improved version. Use markdown.';
      else if (action==='security') prompt += 'Perform a focused security review. List vulnerabilities, risks, and anti-patterns. Use markdown with clear headings.';
      const { text, inputTokens, outputTokens } = await claude(creds.anthropicKey, prompt, model, 1200);
      setInlineAI(text); onUsage?.(inputTokens, outputTokens);
    } catch(e) { toast(e.message, 'error'); }
    finally { setInlineLoading(false); }
  }

  async function runFileSummary() {
    if (!filePath) return;
    setSummLoading(true); setFileSummary('');
    try {
      let prompt = `You are reviewing a pull request.\nPR: "${pr.title}"`;
      if (creds.context) prompt += `\nContext: ${creds.context}`;
      prompt += `\nFile: ${filePath}\n\n`;
      if (oldText && newText && oldText !== newText) {
        const diffRows = rows || computeClientDiff(oldText, newText);
        const diffText = diffRows.filter(r=>!r.hunk&&r.type!=='ctx').map(r=>(r.type==='add'?'+':'-')+r.t).join('\n');
        prompt += `Changed lines:\n\`\`\`\n${diffText.slice(0,4000)}\n\`\`\`\n\n`;
      } else if (newText) {
        prompt += `File content:\n\`\`\`\n${newText.slice(0,4000)}\n\`\`\`\n\n`;
      }
      prompt += `Summarize this file's changes using markdown. Cover: 1) Purpose of changes, 2) Risks or issues, 3) Any conventions violated.`;
      const { text, inputTokens, outputTokens } = await claude(creds.anthropicKey, prompt, model, 1200);
      setFileSummary(text); onUsage?.(inputTokens, outputTokens);
    } catch(e) { toast(e.message, 'error'); }
    finally { setSummLoading(false); }
  }

  async function postInlineComment(commentText, lineNum) {
    if (!commentText.trim() || !filePath) return;
    setPostLoading(true);
    try {
      const iterId = latestIteration?.id || 1;
      await adoPost(
        `${base}/repositories/${repoEnc}/pullrequests/${parsed.prId}/threads?api-version=7.1`,
        creds.pat,
        {
          comments: [{ parentCommentId:0, content:commentText, commentType:1 }],
          status: 1,
          threadContext: { filePath:'/'+filePath, rightFileStart:{line:lineNum,offset:1}, rightFileEnd:{line:lineNum,offset:1} },
          pullRequestThreadContext: { changeTrackingId:1, iterationContext:{ firstComparingIteration:1, secondComparingIteration:iterId } },
        }
      );
      toast(`Inline comment posted on line ${lineNum}`, 'success');
      clearSel();
    } catch(e) { toast(e.message, 'error'); }
    finally { setPostLoading(false); }
  }

  async function postFileComment(commentText) {
    if (!commentText.trim() || !filePath) return;
    setPostLoading(true);
    try {
      await adoPost(
        `${base}/repositories/${repoEnc}/pullrequests/${parsed.prId}/threads?api-version=7.1`,
        creds.pat,
        { comments:[{parentCommentId:0,content:commentText,commentType:1}], status:1, threadContext:{filePath:'/'+filePath} }
      );
      toast(`File comment posted on ${filePath.split('/').pop()}`, 'success');
    } catch(e) { toast(e.message, 'error'); }
    finally { setPostLoading(false); }
  }

  if (!filePath) return (
    <div className="panel" style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48, textAlign:'center' }}>
      <div style={{ width:40, height:40, borderRadius:10, background:'var(--surface)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:12 }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" strokeWidth="1.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <p style={{ fontSize:13, color:'var(--text-muted)', margin:0 }}>Select a file to view its diff</p>
      <p style={{ fontSize:11, color:'var(--text-dim)', margin:'4px 0 0' }}>Click any file in the sidebar</p>
    </div>
  );

  const firstSelRow = selLines.length > 0 ? rows?.[Math.min(...selLines)] : null;
  const firstSelLine = firstSelRow?.mln || firstSelRow?.oln || 1;

  return (
    <div className="panel" style={{ overflow:'hidden' }}>
      {/* File header */}
      <div className="panel-header" style={{ padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span style={{ fontFamily:'JetBrains Mono', fontSize:11, color:'var(--text-muted)', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{filePath}</span>
        <div style={{ display:'flex', gap:6 }}>
          <Btn onClick={runFileSummary} disabled={summLoading} variant="secondary" size="xs">
            {summLoading ? <><Spin size={11} /> Analyzing...</> : 'Summarize File'}
          </Btn>
          {selLines.length > 0 && (
            <span style={{ fontSize:11, color:'var(--accent)', fontWeight:500, padding:'0 4px' }}>
              {selLines.length} line{selLines.length>1?'s':''} selected
            </span>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', borderBottom:'1px solid var(--border)', padding:'0 14px', background:'var(--surface)' }}>
        {['diff','full'].map(t => (
          <button key={t} onClick={()=>setTab(t)} className={`tab ${tab===t?'active':''}`}>
            {t==='diff' ? 'Diff' : 'Full File'}
          </button>
        ))}
      </div>

      {/* File summary */}
      {(fileSummary || summLoading) && (
        <div style={{ padding:'14px 16px', borderBottom:'1px solid var(--border)', background:'rgba(88,166,255,0.04)' }}>
          {summLoading ? <SkeletonBlock /> : (
            <div>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
                <span className="slabel">File Summary</span>
                <PostCommentModal onPost={postFileComment} loading={postLoading} label="Post File Comment" filePath={filePath} />
              </div>
              <MarkdownOutput text={fileSummary} />
            </div>
          )}
        </div>
      )}

      {/* Inline AI selection bar */}
      {selLines.length > 0 && (
        <div style={{ padding:'8px 14px', background:'rgba(88,166,255,0.06)', borderBottom:'1px solid rgba(88,166,255,0.15)', display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
          <span style={{ fontSize:11, color:'var(--accent)', fontWeight:600 }}>Lines selected —</span>
          <Btn onClick={()=>runInlineAI('explain')}   disabled={inlineLoading} variant="secondary" size="xs">Explain</Btn>
          <Btn onClick={()=>runInlineAI('suggest')}   disabled={inlineLoading} variant="secondary" size="xs">Suggest Fix</Btn>
          <Btn onClick={()=>runInlineAI('security')}  disabled={inlineLoading} variant="secondary" size="xs">Security Scan</Btn>
          <Btn onClick={clearSel} variant="ghost" size="xs">Clear</Btn>
        </div>
      )}

      {/* Inline AI result */}
      {(inlineAI || inlineLoading) && (
        <div style={{ padding:'14px 16px', borderBottom:'1px solid var(--border)', background:'var(--surface)' }}>
          {inlineLoading ? <SkeletonBlock /> : (
            <div className="fade-up">
              <MarkdownOutput text={inlineAI} />
              <div style={{ display:'flex', gap:8, marginTop:12 }}>
                <PostCommentModal onPost={(txt)=>postInlineComment(txt,firstSelLine)} loading={postLoading} label="Post as Inline Comment" filePath={filePath} lineNum={firstSelLine} defaultText={inlineAI} />
                <Btn onClick={()=>setInlineAI('')} variant="ghost" size="xs">Dismiss</Btn>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Diff content */}
      {loading && (
        <div style={{ padding:20 }}>
          <SkeletonLine w="40%" h={11} />
          {[...Array(8)].map((_,i) => <SkeletonLine key={i} w={`${55+Math.random()*40}%`} h={11} />)}
        </div>
      )}
      {!loading && rows !== null && (
        <div style={{ overflow:'auto', maxHeight:520, background:'var(--bg)' }}>
          {tab === 'diff' && <DiffTable rows={rows} selLines={selLines} onToggleLine={toggleLine} />}
          {tab === 'full' && full && <FullFile content={full} />}
        </div>
      )}
    </div>
  );
}

function DiffTable({ rows, selLines, onToggleLine }) {
  return (
    <table className="code-table">
      <tbody>
        {rows.map((row, idx) => {
          if (row.hunk) return (
            <tr key={idx} className="hunk-row">
              <td colSpan={4} style={{ padding:'4px 12px' }}>{row.hunk}</td>
            </tr>
          );
          const isAdd=row.type==='add', isDel=row.type==='del';
          const sel = selLines.includes(idx);
          return (
            <tr key={idx}
              className={`diff-row-selectable ${isAdd?'diff-add':isDel?'diff-del':'diff-ctx'} ${sel?'diff-row-selected':''}`}
              onClick={()=>onToggleLine(idx)}
              title="Click to select for AI analysis or inline comment">
              <td className="ln">{row.oln||''}</td>
              <td className="ln">{row.mln||''}</td>
              <td className={isAdd?'sign-add':isDel?'sign-del':'sign-ctx'}>{isAdd?'+':isDel?'-':' '}</td>
              <td style={{ paddingLeft:8 }}>{row.t}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

function FullFile({ content }) {
  return (
    <table className="code-table">
      <tbody>
        {content.split('\n').map((line, i) => (
          <tr key={i} className="diff-ctx">
            <td className="ln" colSpan={2}>{i+1}</td>
            <td className="sign-ctx"> </td>
            <td style={{ paddingLeft:8 }}>{line}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}
